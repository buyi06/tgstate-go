name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
        include:
          - goos: linux
            goarch: amd64
            artifact_name: tgstate-linux-amd64
          - goos: linux
            goarch: arm64
            artifact_name: tgstate-linux-arm64
          - goos: darwin
            goarch: amd64
            artifact_name: tgstate-darwin-amd64
          - goos: darwin
            goarch: arm64
            artifact_name: tgstate-darwin-arm64
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go mod download
          go build -ldflags="-s -w" -o ${{ matrix.artifact_name }} ./cmd/server
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          retention-days: 30
